version: '3.8'

services:
  # PostgreSQL 主数据库 (应用 + Langfuse 共用)
  postgres:
    image: postgres:15-alpine
    container_name: linchat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-linchat_123}
      POSTGRES_MULTIPLE_DATABASES: linchat,langfuse
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - linchat-network

  # Redis 缓存服务
  redis:
    image: redis:7-alpine
    container_name: linchat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy volatile-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - linchat-network

  # Langfuse LLM 监控
  langfuse:
    image: langfuse/langfuse:latest
    container_name: linchat-langfuse
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-linchat_123}@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET:-linchat-langfuse-secret-key-change-me}
      SALT: ${LANGFUSE_SALT:-linchat-langfuse-salt-change-me}
      TELEMETRY_ENABLED: ${LANGFUSE_TELEMETRY:-false}
    ports:
      - "3000:3000"
    networks:
      - linchat-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  linchat-network:
    driver: bridge
